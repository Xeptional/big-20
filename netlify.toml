[build]
  # This command uses double quotes around the variable parts so they expand correctly.
  # The '#' delimiter avoids conflicts with slashes in the URL.
  command = """
    sed -i 's#SUPABASE_URL_PLACEHOLDER#'"$SUPABASE_URL"'#g' js/supabase.js && \
    sed -i 's#SUPABASE_ANON_KEY_PLACEHOLDER#'"$SUPABASE_ANON_KEY"'#g' js/supabase.js
  """
  publish = "."

[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/leave-message"
  to = "/leave-message.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"